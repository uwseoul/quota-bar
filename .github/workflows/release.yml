name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      REPO_SLUG: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Build release
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          RELEASE_VERSION="$RELEASE_VERSION" RELEASE_BUILD_NUMBER="$RELEASE_BUILD_NUMBER" ./scripts/release-macos.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GLMBar.zip
            dist/glm-bar-macos.tar.gz
          body: |
            ## GLM Bar ${{ github.ref_name }}
            
            ### Downloads
            - **GLMBar.zip** - App bundle (recommended)
            - **glm-bar-macos.tar.gz** - CLI binary
            
            ### Installation
            1. Download `GLMBar.zip`
            2. Extract and move `GLMBar.app` to Applications
            3. Right-click and select "Open" on first launch
            
            ### What's Changed
            See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
